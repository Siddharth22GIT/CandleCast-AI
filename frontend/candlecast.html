<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CandleCast — Crypto Signal Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;
  --surface:#111318;
  --surface2:#181b22;
  --surface3:#1e2230;
  --border:#ffffff12;
  --border2:#ffffff20;
  --text:#f0f2f8;
  --muted:#7a8099;
  --muted2:#4a5068;
  --buy:#00e5a0;
  --buy-bg:#00e5a015;
  --sell:#ff4d6d;
  --sell-bg:#ff4d6d15;
  --hold:#f5a623;
  --hold-bg:#f5a62315;
  --accent:#6c63ff;
  --accent2:#3ecfff;
  --mono:'Space Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* TOP NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(10,11,15,0.92);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px}
.logo-text{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.5px}
.logo-text span{color:var(--accent2)}
.nav-right{display:flex;align-items:center;gap:12px}
.model-badge{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--border2);padding:4px 10px;border-radius:20px;letter-spacing:.5px}
.accuracy-badge{font-family:var(--mono);font-size:10px;color:var(--buy);border:1px solid var(--buy);padding:4px 10px;border-radius:20px;letter-spacing:.5px;background:var(--buy-bg)}

/* HERO STATS */
.hero{padding:28px 28px 20px;border-bottom:1px solid var(--border)}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;max-width:100%;width:100%;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:700}
.stat-val.buy{color:var(--buy)}
.stat-val.sell{color:var(--sell)}
.stat-val.hold{color:var(--hold)}
.stat-val.white{color:var(--text)}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 130px)}

/* LEFT PANEL */
.left-panel{border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 130px)}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.panel-title{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.8px}
.search-box{width:100%;padding:10px 14px 10px 36px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--accent)}
.search-wrap{position:relative;padding:12px 16px;border-bottom:1px solid var(--border)}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.filter-row{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border)}
.filter-btn{font-family:var(--mono);font-size:10px;letter-spacing:.5px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:20px;padding:5px 12px;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn.buy.active{background:var(--buy);border-color:var(--buy);color:#000}
.filter-btn.sell.active{background:var(--sell);border-color:var(--sell);color:#fff}
.filter-btn.hold.active{background:var(--hold);border-color:var(--hold);color:#000}

/* COIN LIST */
.coin-list{padding:8px 0}
.coin-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;gap:12px}
.coin-item:hover{background:var(--surface)}
.coin-item.active{background:var(--surface2);border-left-color:var(--accent)}
.coin-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}
.coin-info{flex:1;min-width:0}
.coin-name{font-size:13px;font-weight:500;margin-bottom:2px}
.coin-price{font-family:var(--mono);font-size:11px;color:var(--muted)}
.coin-right{text-align:right;flex-shrink:0}
.signal-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.signal-badge.BUY{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy)30}
.signal-badge.SELL{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell)30}
.signal-badge.HOLD{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold)30}
.coin-change{font-family:var(--mono);font-size:10px;margin-top:3px}
.pos{color:var(--buy)}
.neg{color:var(--sell)}

/* RIGHT PANEL */
.right-panel{padding:24px 28px;overflow-y:auto;max-height:calc(100vh - 130px)}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.detail-coin-info{display:flex;align-items:center;gap:16px}
.detail-avatar{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:16px;font-weight:700}
.detail-name{font-family:var(--mono);font-size:26px;font-weight:700;margin-bottom:4px}
.detail-price{font-family:var(--mono);font-size:14px;color:var(--muted)}
.detail-signal{text-align:right}
.big-signal{font-family:var(--mono);font-size:32px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.big-signal.BUY{color:var(--buy)}
.big-signal.SELL{color:var(--sell)}
.big-signal.HOLD{color:var(--hold)}
.conf-text{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* CHART */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.chart-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.8px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.chart-wrap{position:relative;width:100%;height:220px}

/* METRICS GRID */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.metric-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.7px;margin-bottom:6px}
.metric-val{font-family:var(--mono);font-size:18px;font-weight:700}

/* PROB BARS */
.prob-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.prob-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.prob-row:last-child{margin-bottom:0}
.prob-label{font-family:var(--mono);font-size:11px;font-weight:700;width:36px;letter-spacing:.5px}
.prob-bar-wrap{flex:1;height:8px;background:var(--surface3);border-radius:4px;overflow:hidden}
.prob-bar{height:100%;border-radius:4px;transition:width .6s ease}
.prob-bar.buy{background:var(--buy)}
.prob-bar.sell{background:var(--sell)}
.prob-bar.hold{background:var(--hold)}
.prob-pct{font-family:var(--mono);font-size:11px;color:var(--muted);width:36px;text-align:right}

/* RSI GAUGE */
.indicators-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.indicator-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.indicator-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.7px;margin-bottom:12px}
.rsi-track{width:100%;height:6px;background:linear-gradient(to right,var(--sell) 0%,var(--hold) 30%,var(--hold) 70%,var(--buy) 100%);border-radius:3px;position:relative;margin-bottom:8px}
.rsi-needle{width:12px;height:12px;background:var(--text);border-radius:50%;position:absolute;top:-3px;transform:translateX(-50%);transition:left .6s ease;box-shadow:0 0 6px rgba(255,255,255,.3)}
.rsi-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted2)}
.rsi-val{font-family:var(--mono);font-size:20px;font-weight:700;text-align:center}
.vol-info{display:flex;flex-direction:column;gap:8px}
.vol-row{display:flex;justify-content:space-between;align-items:center}
.vol-key{font-size:12px;color:var(--muted)}
.vol-v{font-family:var(--mono);font-size:12px;font-weight:500}

/* DISCLAIMER */
.disclaimer{background:var(--surface);border:1px solid var(--hold)30;border-radius:10px;padding:14px 16px;font-size:12px;color:var(--muted);line-height:1.6}
.disclaimer span{color:var(--hold);font-weight:500}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);font-family:var(--mono);font-size:12px;padding:60px 0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* MOBILE */
@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .right-panel{display:none}
  .right-panel.mobile-show{display:block;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;padding:20px}
  .left-panel{max-height:calc(100vh - 130px)}
  .back-btn{display:flex!important}
}
.back-btn{display:none;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--border);padding:7px 14px;border-radius:6px;cursor:pointer;margin-bottom:20px}

/* CONFIDENCE ring */
.conf-ring{position:relative;width:64px;height:64px}
.conf-ring canvas{position:absolute;inset:0}
.conf-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.conf-ring-pct{font-family:var(--mono);font-size:13px;font-weight:700}
.conf-ring-label{font-family:var(--mono);font-size:7px;color:var(--muted);letter-spacing:.5px}

.no-results{text-align:center;padding:32px 16px;font-family:var(--mono);font-size:11px;color:var(--muted2)}

/* AI PREDICT BUTTON */
.ai-predict-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;padding:9px 16px;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;white-space:nowrap}
.ai-predict-btn:hover{opacity:.85}
.ai-predict-btn svg{width:14px;height:14px;flex-shrink:0}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;position:relative}
.modal-header{padding:24px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-family:var(--mono);font-size:16px;font-weight:700}
.modal-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .2s}
.modal-close:hover{border-color:var(--border2);color:var(--text)}
.modal-body{padding:20px 24px 24px}

/* INPUT FORM */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:520px){.input-grid{grid-template-columns:1fr}}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-group.full{grid-column:1/-1}
.input-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.7px}
.input-field{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .2s;width:100%}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--muted2)}
select.input-field option{background:var(--surface2)}

/* COIN SUGGEST DROPDOWN */
.coin-suggest{position:relative}
.suggest-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;z-index:100;max-height:180px;overflow-y:auto;display:none}
.suggest-list.show{display:block}
.suggest-item{padding:8px 14px;font-family:var(--mono);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.suggest-item:hover,.suggest-item.highlighted{background:var(--surface3)}
.suggest-sym{font-weight:700;color:var(--text)}
.suggest-price{color:var(--muted);font-size:11px}
.suggest-sig{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700}

/* GENERATE BTN */
.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:10px}
.gen-btn:hover{opacity:.88}
.gen-btn:disabled{opacity:.45;cursor:not-allowed}

/* LOADING STATE */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 0}
.loading-dots{display:flex;gap:6px}
.loading-dots span{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:bounce .8s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s;background:var(--accent2)}
.loading-dots span:nth-child(3){animation-delay:.3s;background:var(--buy)}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
.loading-label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px}

/* REPORT */
.report{margin-top:20px}
.report-divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.report-section{margin-bottom:20px}
.report-section-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.8px;margin-bottom:10px;text-transform:uppercase}
.report-text{font-size:13px;line-height:1.8;color:var(--text)}
.report-text p{margin-bottom:10px}
.report-text p:last-child{margin-bottom:0}

/* VERDICT CARD */
.verdict-card{border-radius:12px;padding:20px;margin-top:20px;border-width:1px;border-style:solid}
.verdict-card.BUY{background:#00e5a008;border-color:#00e5a030}
.verdict-card.SELL{background:#ff4d6d08;border-color:#ff4d6d30}
.verdict-card.HOLD{background:#f5a62308;border-color:#f5a62330}
.verdict-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.verdict-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.verdict-icon.BUY{background:#00e5a020}
.verdict-icon.SELL{background:#ff4d6d20}
.verdict-icon.HOLD{background:#f5a62320}
.verdict-label{font-family:var(--mono);font-size:22px;font-weight:700}
.verdict-label.BUY{color:var(--buy)}
.verdict-label.SELL{color:var(--sell)}
.verdict-label.HOLD{color:var(--hold)}
.verdict-sublabel{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.5px}
.verdict-conclusions{display:flex;flex-direction:column;gap:8px}
.verdict-point{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.6}
.verdict-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.verdict-bullet.BUY{background:var(--buy)}
.verdict-bullet.SELL{background:var(--sell)}
.verdict-bullet.HOLD{background:var(--hold)}

/* INVESTMENT CALC */
.inv-calc{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px}
.inv-stat{background:var(--surface3);border-radius:8px;padding:12px}
.inv-stat-label{font-family:var(--mono);font-size:9px;color:var(--muted2);letter-spacing:.6px;margin-bottom:5px}
.inv-stat-val{font-family:var(--mono);font-size:14px;font-weight:700}


/* BEAUTIFUL REPORT UI */
.analysis-report{
  background: linear-gradient(180deg, rgba(108,99,255,.08), rgba(62,207,255,.03));
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 18px;
  margin-top: 18px;
  box-shadow: 0 12px 50px rgba(0,0,0,.18);
}

.report-topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:16px;
}

.report-kicker{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  letter-spacing:.9px;
  text-transform:uppercase;
}

.report-title-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin-top:8px;
}

.report-coin-pill,
.report-price-pill,
.report-position-pill{
  font-family:var(--mono);
  font-size:11px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,.03);
  color:var(--text);
}

.report-signal-pill{
  font-family:var(--mono);
  font-size:11px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,.03);
}

.report-signal-pill.BUY{
  color:var(--buy);
  border-color:#00e5a040;
  background:#00e5a010;
}

.report-signal-pill.SELL{
  color:var(--sell);
  border-color:#ff4d6d40;
  background:#ff4d6d10;
}

.report-signal-pill.HOLD{
  color:var(--hold);
  border-color:#f5a62340;
  background:#f5a62310;
}

.report-download-btn{
  width:38px;
  height:38px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,.03);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
}

.report-download-btn:hover{
  transform:translateY(-1px);
  border-color:var(--accent);
  background:rgba(108,99,255,.12);
}

.report-download-btn svg{
  width:16px;
  height:16px;
}

.report-hero{
  display:grid;
  grid-template-columns:1.3fr .9fr;
  gap:14px;
  margin-bottom:16px;
}

@media(max-width:700px){
  .report-hero{grid-template-columns:1fr}
}

.report-hero-main,
.report-hero-side{
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.report-verdict{
  font-family:var(--mono);
  font-size:30px;
  font-weight:700;
  letter-spacing:1px;
}

.report-verdict.BUY{color:var(--buy)}
.report-verdict.SELL{color:var(--sell)}
.report-verdict.HOLD{color:var(--hold)}

.report-confidence{
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.report-stat-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
}

.report-stat{
  background:var(--surface3);
  border-radius:12px;
  padding:12px;
  border:1px solid var(--border);
}

.report-stat-label{
  font-family:var(--mono);
  font-size:9px;

.report-section-grid{

}

}

.report-section-card.buy{border-top:3px solid var(--buy)}
.report-section-card.sell{border-top:3px solid var(--sell)}
.report-section-card.hold{border-top:3px solid var(--hold)}

.report-section-title{

  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.9px;
  color:var(--muted);

.report-section-text{
  font-size:13px;
  line-height:1.75;
  color:var(--text);
}

.report-section-text p{
  margin-bottom:8px;
}

.report-section-text strong{
  color:var(--text);
}

.report-bullets{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.report-bullet{
  display:flex;
  align-items:flex-start;

  font-size:13px;

}

  height:7px;
  border-radius:999px;
  background:var(--accent2);
  margin-top:7px;
  flex-shrink:0;
}

.target-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
}

@media(max-width:700px){
  .target-grid{grid-template-columns:1fr}
}

.target-card{
  background:var(--surface3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.target-label{
  font-family:var(--mono);
  font-size:9px;

  letter-spacing:.7px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.target-value{
  font-family:var(--mono);

.target-value.buy{color:var(--buy)}

async function fetchLivePrice(coin) {
  try {
    const res = await fetch(`/api/price/${coin}`);
    const data = await res.json();
    return data.price;
  } catch (err) {
    console.error(err);
    return null;
  }
}

async function getML(features) {
  const res = await fetch('/api/ml-predict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(features)
  });
  return await res.json();
}

// Color palette per coin
const COIN_COLORS = ['#6c63ff','#3ecfff','#00e5a0','#f5a623','#ff4d6d','#a78bfa','#34d399','#60a5fa','#f472b6','#fb923c'];
function coinColor(sym){const h=sym.split('').reduce((a,c)=>a+c.charCodeAt(0),0);return COIN_COLORS[h%COIN_COLORS.length]}

function fmtPrice(p){
  if(p===0||p===null)return '$0.000';
  if(p>=1000)return '$'+p.toLocaleString('en',{maximumFractionDigits:2});
  if(p>=1)return '$'+p.toFixed(4);
  if(p>=0.0001)return '$'+p.toFixed(6);
  return '$'+p.toExponential(2);
}

function fmtChange(c){
  const s=c>=0?'+':'';
  return `<span class="${c>=0?'pos':'neg'}">${s}${c.toFixed(2)}%</span>`;
}

// HERO STATS
function renderHero(){
  const coins=Object.keys(PREDICTIONS);
  const buy=coins.filter(k=>PREDICTIONS[k].signal==='BUY').length;
  const sell=coins.filter(k=>PREDICTIONS[k].signal==='SELL').length;
  const hold=coins.filter(k=>PREDICTIONS[k].signal==='HOLD').length;
  const avgConf=(coins.reduce((s,k)=>s+PREDICTIONS[k].confidence,0)/coins.length).toFixed(1);
  const highConf=coins.filter(k=>PREDICTIONS[k].confidence>=65).length;
  document.getElementById('heroStats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Coins</div><div class="stat-val white">${coins.length}</div></div>
    <div class="stat-card"><div class="stat-label">BUY Signals</div><div class="stat-val buy">${buy}</div></div>
    <div class="stat-card"><div class="stat-label">SELL Signals</div><div class="stat-val sell">${sell}</div></div>
    <div class="stat-card"><div class="stat-label">HOLD Signals</div><div class="stat-val hold">${hold}</div></div>
    <div class="stat-card"><div class="stat-label">Avg Confidence</div><div class="stat-val white">${avgConf}%</div></div>
    <div class="stat-card"><div class="stat-label">High Conf (65%+)</div><div class="stat-val white">${highConf}</div></div>
  `;
}

let latestReportMeta = null;

function escapeHtml(str = '') {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatRichText(text = '') {
  const raw = String(text || '').trim();
  if (!raw) return '<p style="color:var(--muted)">Not provided.</p>';

  const blocks = raw.split(/\n{2,}/).map(s => s.trim()).filter(Boolean);
  return blocks.map(block => {
    const safe = escapeHtml(block)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
    return `<p>${safe}</p>`;
  }).join('');
}

function safeJsonParse(text) {
  if (!text) return null;

  const cleaned = String(text)
    .trim()
    .replace(/^```json\s*/i, '')
    .replace(/^```\s*/i, '')
    .replace(/```$/i, '')
    .trim();

  try {
    return JSON.parse(cleaned);
  } catch {}

  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if (start !== -1 && end !== -1 && end > start) {
    try {
      return JSON.parse(cleaned.slice(start, end + 1));
    } catch {}
  }

  return null;
}

function splitSentences(text = '') {
  return String(text || '')
    .replace(/\n+/g, ' ')
    .split(/(?<=[.!?])\s+/)
    .map(s => s.trim())
    .filter(Boolean)
    .slice(0, 3);
}

function normalizeReport(rawText) {
  const parsed = safeJsonParse(rawText);

  if (parsed) {
    return {
      headline: parsed.headline || 'AI trade analysis',
      summary: parsed.summary || parsed.overview || '',
      market_context: parsed.market_context || parsed.market || '',
      technical_analysis: parsed.technical_analysis || parsed.technical || '',
      risk_assessment: parsed.risk_assessment || parsed.risk || '',
      action_plan: parsed.action_plan || parsed.recommendation || '',
      verdict: (parsed.verdict || '').toUpperCase(),
      conclusions: Array.isArray(parsed.conclusions)
        ? parsed.conclusions
        : (parsed.conclusions ? [parsed.conclusions] : []),
      optimistic_target: parsed.optimistic_target || parsed.target_optimistic || '',
      base_target: parsed.base_target || parsed.target_base || '',
      bearish_target: parsed.bearish_target || parsed.target_bearish || ''
    };
  }

  const fallbackSummary = String(rawText || '').trim();
  return {
    headline: 'AI trade analysis',
    summary: fallbackSummary,
    market_context: '',
    technical_analysis: '',
    risk_assessment: '',
    action_plan: '',
    verdict: '',
    conclusions: splitSentences(fallbackSummary),
    optimistic_target: '',
    base_target: '',
    bearish_target: ''
  };
}

  if (!source || !window.html2canvas || !window.jspdf) return;

  const cloneWrap = document.createElement('div');
  cloneWrap.style.position = 'fixed';
  cloneWrap.style.left = '-10000px';
  cloneWrap.style.top = '0';
  cloneWrap.style.width = '980px';
  cloneWrap.style.background = '#0a0b0f';
  cloneWrap.innerHTML = source.outerHTML;
  document.body.appendChild(cloneWrap);

  const clone = cloneWrap.querySelector('#analysisReportCard');

  const canvas = await html2canvas(clone, {
    scale: 2,
    backgroundColor: '#0a0b0f',
    useCORS: true
  });

  document.body.removeChild(cloneWrap);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'pt', 'a4');

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgWidth = pageWidth;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  const imgData = canvas.toDataURL('image/png');

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
    heightLeft -= pageHeight;
  }

  const fileName = `CandleCast-${(latestReportMeta?.coin || 'Report')}-Analysis.pdf`;
  pdf.save(fileName);
}
// ─── GENERATE PREDICTION ─────────────────────────────────────────────────────
async function generatePrediction() {
  const coin = document.getElementById('inputCoin').value.trim().toLowerCase();
  const amount = document.getElementById('inputAmount').value.trim();
  const position = document.getElementById('inputPosition').value;

  const output = document.getElementById('reportArea');
  const btn = document.getElementById('genBtn');

  if (!coin) {
    output.innerHTML = `
      <p style="color:var(--sell);font-family:var(--mono);font-size:12px">
        ❌ Please enter a coin
      </p>
    `;
    return;
  }

  btn.disabled = true;

  output.innerHTML = `
    <div class="loading-state">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-label">Fetching live market price...</div>
    </div>
  `;

  // STEP 1 → LIVE PRICE
  const price = await fetch(`/api/price/${coin}`)
    .then(res => res.json())
    .then(data => data && typeof data.price !== 'undefined'
      ? Number(data.price)
      : null
    )
    .catch(() => null);

  if (!price) {
    output.innerHTML = `
      <p style="color:var(--sell);font-family:var(--mono);font-size:12px">
        ❌ Invalid coin or API error
      </p>
    `;
    btn.disabled = false;
    return;
  }

  output.innerHTML = `
    <div class="loading-state">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-label">Running ML prediction model...</div>
    </div>
  `;

  // STEP 2 → ML FEATURES
  const features = {
    return: 0.02,
    ma7: price * 0.98,
    ma30: price * 0.95,
    volatility: 1.5
  };

  // STEP 3 → ML API
  const ml = await fetch('/api/ml-predict', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(features)
  })
    .then(res => res.json())
    .catch(() => null);

  if (!ml) {
    output.innerHTML = `
      <p style="color:var(--sell);font-family:var(--mono);font-size:12px">
        ❌ ML prediction failed
      </p>
    `;
    btn.disabled = false;
    return;
  }

  const signal =
    ml.signal ??
    ml.prediction?.signal ??
    ml.result?.signal ??
    'HOLD';

  const confidenceValue =
    ml.confidence ??
    ml.prediction?.confidence ??
    ml.result?.confidence ??
    null;

  const confidencePct =
    confidenceValue === null || confidenceValue === undefined
      ? 'N/A'
      : `${(Number(confidenceValue) * 100).toFixed(2)}%`;

  const sigClass = String(signal).toUpperCase();

  // SHOW INITIAL SIGNAL CARD
  output.innerHTML = `
    <div class="verdict-card ${sigClass}">
      <div class="verdict-header">
        <div class="verdict-icon ${sigClass}">
          ${
            sigClass === 'BUY'
              ? '🚀'
              : sigClass === 'SELL'
              ? '🔻'
              : '⏸'
          }
        </div>

        <div>
          <div class="verdict-label ${sigClass}">
            ${sigClass}
          </div>

          <div class="verdict-sublabel">
            Confidence: ${confidencePct}
          </div>
        </div>
      </div>

      <div class="verdict-conclusions">

        <div class="verdict-point">
          <div class="verdict-bullet ${sigClass}"></div>
          Coin: <b>${coin.toUpperCase()}</b>
        </div>

        <div class="verdict-point">
          <div class="verdict-bullet ${sigClass}"></div>
          Live price: <b>${fmtPrice(price)}</b>
        </div>

        <div class="verdict-point">
          <div class="verdict-bullet ${sigClass}"></div>
          Position: <b>${position.replaceAll('_', ' ')}</b>
        </div>

        <div class="verdict-point">
          <div class="verdict-bullet ${sigClass}"></div>
          Investment: <b>$${Number(amount || 0).toLocaleString()}</b>
        </div>

      </div>
    </div>

    <hr class="report-divider">

    <div class="loading-state" style="padding:12px 0 0">
      <div class="loading-label">
        Generating AI analysis report...
      </div>
    </div>
  `;

  latestReportMeta = {
    coin: coin.toUpperCase(),
    price,
    signal: sigClass,
    confidence: confidencePct,
    amount: amount || '0',
    position
  };

  // STEP 4 → AI REPORT
  const ai = await fetch('/api/report', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },

    body: JSON.stringify({
      prompt: `
You are CandleCast AI.

Return STRICT JSON ONLY.
No markdown.
No backticks.
No extra explanation.

Use this exact structure:

{
  "headline": "One strong professional sentence",
  "summary": "Detailed summary",
  "market_context": "Current market conditions and momentum",
  "technical_analysis": "Technical interpretation of the signal",
  "risk_assessment": "Main risks and volatility concerns",
  "action_plan": "Suggested next step for the investor",
  "verdict": "BUY or SELL or HOLD",
  "conclusions": [
    "Conclusion 1",
    "Conclusion 2",
    "Conclusion 3"
  ],
  "optimistic_target": "number only",
  "base_target": "number only",
  "bearish_target": "number only"
}

Trade Details:

Coin: ${coin.toUpperCase()}
Live Price: ${price}
Model Signal: ${sigClass}
Model Confidence: ${confidencePct}
Investment Amount: $${amount || '0'}
Position: ${position}

Make the analysis:
- professional
- visually descriptive
- realistic
- specific to the coin
- specific to the current price
- specific to the user's position
`
    })
  })
    .then(res => res.json())
    .catch(() => null);

  // FALLBACK REPORT
  const reportData = normalizeReport(
    ai && ai.text
      ? ai.text
      : JSON.stringify({
          headline: 'AI analysis unavailable',
          summary:
            'The prediction signal was generated successfully, but the AI report could not be loaded.',

          market_context:
            'Live market data and ML prediction are still functioning correctly.',

          technical_analysis:
            'The model returned a valid signal, but the long-form AI analysis is currently unavailable.',

          risk_assessment:
            'Without the AI layer, deeper contextual interpretation is limited.',

          action_plan:
            'Check your API key or AI provider configuration to restore full AI reports.',

          verdict: sigClass,

          conclusions: [
            'The ML prediction engine is functioning properly.',
            'Live pricing and signal generation are operational.',
            'Only the AI explanation service is unavailable.'
          ],

          optimistic_target: '',
          base_target: '',
          bearish_target: ''
        })
  );

  // FINAL BEAUTIFUL REPORT
  output.innerHTML = renderBeautifulReport(
    reportData,
    latestReportMeta
  );

  btn.disabled = false;
}
// ─── RENDER REPORT ────────────────────────────────────────────────────────────
function renderReport(r,sym,price,amount,period,d){
  const verdict=r.verdict||d.signal;
  const col=verdict==='BUY'?'var(--buy)':verdict==='SELL'?'var(--sell)':'var(--hold)';
  const icon=verdict==='BUY'?'📈':verdict==='SELL'?'📉':'⏸';
  const coins=(parseFloat(amount)/parseFloat(price));
  const coinsStr=coins>=0.001?coins.toFixed(4):coins.toExponential(2);

  const optTarget=parseFloat(r.target_optimistic)||null;
  const baseTarget=parseFloat(r.target_base)||null;
  const bearTarget=parseFloat(r.target_bearish)||null;

  const optReturn=optTarget?((optTarget-price)/price*100).toFixed(1):null;
  const baseReturn=baseTarget?((baseTarget-price)/price*100).toFixed(1):null;
  const bearReturn=bearTarget?((bearTarget-price)/price*100).toFixed(1):null;

  const optVal=optTarget?(coins*optTarget).toFixed(2):null;
  const baseVal=baseTarget?(coins*baseTarget).toFixed(2):null;
  const bearVal=bearTarget?(coins*bearTarget).toFixed(2):null;

  document.getElementById('reportArea').innerHTML=`
  <hr class="report-divider">
  <div class="report">

    <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.5">"${r.headline||''}"</div>

    <div class="report-section">
      <div class="report-section-title">Historical Overview</div>
      <div class="report-text"><p>${r.history||''}</p></div>
    </div>

    <div class="report-section">
      <div class="report-section-title">Current Market Conditions</div>
      <div class="report-text"><p>${r.market_context||''}</p></div>
    </div>

    <div class="report-section">
      <div class="report-section-title">Investment Analysis · $${parseFloat(amount).toLocaleString()} · ${period}</div>
      <div class="report-text"><p>${r.investment_analysis||''}</p></div>
    </div>

    <div class="report-section">
      <div class="report-section-title">Risk Assessment</div>
      <div class="report-text"><p>${r.risk_assessment||''}</p></div>
    </div>

    ${(optTarget||baseTarget||bearTarget)?`
    <div class="report-section">
      <div class="report-section-title">Price Targets · ${period}</div>
      <div class="inv-calc">
        ${optTarget?`<div class="inv-stat">
          <div class="inv-stat-label">OPTIMISTIC</div>
          <div class="inv-stat-val" style="color:var(--buy)">$${optTarget.toLocaleString()}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--buy);margin-top:3px">+${optReturn}%</div>
          ${optVal?`<div style="font-size:11px;color:var(--muted);margin-top:4px">→ $${parseFloat(optVal).toLocaleString()}</div>`:''}
        </div>`:''}
        ${baseTarget?`<div class="inv-stat">
          <div class="inv-stat-label">BASE CASE</div>
          <div class="inv-stat-val" style="color:${parseFloat(baseReturn)>=0?'var(--buy)':'var(--sell)'}">$${baseTarget.toLocaleString()}</div>
          <div style="font-family:var(--mono);font-size:10px;color:${parseFloat(baseReturn)>=0?'var(--buy)':'var(--sell)'};margin-top:3px">${parseFloat(baseReturn)>=0?'+':''}${baseReturn}%</div>
          ${baseVal?`<div style="font-size:11px;color:var(--muted);margin-top:4px">→ $${parseFloat(baseVal).toLocaleString()}</div>`:''}
        </div>`:''}
        ${bearTarget?`<div class="inv-stat">
          <div class="inv-stat-label">BEARISH</div>
          <div class="inv-stat-val" style="color:var(--sell)">$${bearTarget.toLocaleString()}</div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--sell);margin-top:3px">${parseFloat(bearReturn)>=0?'+':''}${bearReturn}%</div>
          ${bearVal?`<div style="font-size:11px;color:var(--muted);margin-top:4px">→ $${parseFloat(bearVal).toLocaleString()}</div>`:''}
        </div>`:''}
        <div class="inv-stat">
          <div class="inv-stat-label">YOUR COINS</div>
          <div class="inv-stat-val" style="color:var(--text)">${coinsStr}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">at $${parseFloat(price).toLocaleString()}</div>
        </div>
      </div>
    </div>`:''}

    <div class="verdict-card ${verdict}">
      <div class="verdict-header">
        <div class="verdict-icon ${verdict}">${icon}</div>
        <div>
          <div class="verdict-label ${verdict}">${verdict}</div>
          <div class="verdict-sublabel">FINAL VERDICT · ${sym} · ${period.toUpperCase()}</div>
        </div>
      </div>
      <div class="verdict-conclusions">
        ${(r.conclusions||[]).map(c=>`
          <div class="verdict-point">
            <div class="verdict-bullet ${verdict}"></div>
            <span>${c}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="disclaimer" style="margin-top:16px">
      <span>Disclaimer:</span> This AI-generated report is for informational purposes only and does not constitute financial advice. Crypto markets are highly volatile. Past performance does not guarantee future results. Always do your own research.
    </div>
  </div>`;
}
